<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EducaLog — Plataforma Acadêmica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --blue:#1a6ef5;--blue-dark:#1358cc;--blue-light:#eff6ff;--blue-glow:rgba(26,110,245,.15);
  --green:#059669;--green-light:#ecfdf5;--green-text:#065f46;
  --amber:#d97706;--amber-light:#fffbeb;--amber-text:#92400e;
  --red:#dc2626;--red-light:#fef2f2;--red-text:#991b1b;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --bg:#f8f9fc;--bg2:#f1f3f9;--white:#fff;
  --border:#e4e7ef;--border2:#d1d9ed;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--muted2:#94a3b8;
  --sidebar-w:252px;--radius:12px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.07);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit;font-size:14px;border:1.5px solid var(--border);border-radius:var(--radius);outline:none;padding:10px 13px;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-glow)}
.hidden{display:none!important}
a{color:var(--blue);cursor:pointer;text-decoration:none}

/* AUTH */
#auth-screen{display:flex;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#1a6ef5 100%);align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden}
#auth-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(26,110,245,.25),transparent 70%);pointer-events:none}
#auth-screen::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.auth-card{background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:2.25rem 2.25rem 1.75rem;width:100%;max-width:460px;box-shadow:var(--shadow-lg);position:relative;z-index:1;animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:.4rem;justify-content:center}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(26,110,245,.35)}
.logo-icon i{font-size:24px;color:#fff}
.logo-text{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.logo-sub{font-size:12.5px;color:var(--muted);text-align:center;margin-bottom:1.75rem;font-weight:500}
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:11px;padding:3px;margin-bottom:1.5rem;border:1.5px solid var(--border)}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border:none;background:transparent;transition:all .2s}
.tab.active{background:var(--white);color:var(--blue);box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.role-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.2rem}
.role-pill{padding:7px 15px;border-radius:30px;font-size:12.5px;border:1.5px solid var(--border);cursor:pointer;background:var(--bg);color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:6px;font-weight:500}
.role-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.role-pill.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(26,110,245,.3)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:100%}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border:none;border-radius:11px;font-size:14px;cursor:pointer;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 14px rgba(26,110,245,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,110,245,.45)}
.msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;font-weight:500}
.msg-err{background:var(--red-light);color:var(--red-text);border:1.5px solid #fecaca}
.msg-ok{background:var(--green-light);color:var(--green-text);border:1.5px solid #a7f3d0}

/* LAYOUT */
#main-screen{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1.5px solid var(--border);padding:1.25rem;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:2px 0 12px rgba(0,0,0,.04)}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1.5px solid var(--border)}
.sidebar-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(26,110,245,.3)}
.sidebar-logo-icon i{font-size:18px;color:#fff}
.sidebar-logo-text{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.nav-label{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin-bottom:5px;margin-top:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--text2);margin-bottom:1px;transition:all .15s;font-weight:500;position:relative}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--blue);border-radius:0 3px 3px 0}
.nav-item i{font-size:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sidebar-bottom{margin-top:auto;padding-top:1.25rem;border-top:1.5px solid var(--border)}
.user-card{background:var(--bg);border-radius:11px;padding:10px 12px;margin-bottom:8px;border:1.5px solid var(--border)}
.user-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.user-role-badge{font-size:11px;color:#fff;font-weight:600;background:var(--blue);border-radius:20px;padding:2px 8px;display:inline-block;margin-bottom:3px}
.user-curso{font-size:11px;color:var(--muted);font-weight:500}
.sidebar-logout{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:9px;color:var(--muted);cursor:pointer;font-size:12.5px;font-weight:500;transition:all .15s}
.sidebar-logout:hover{background:var(--red-light);color:var(--red-text)}
.content{flex:1;padding:2rem 2.25rem;overflow-y:auto;background:var(--bg);min-height:100vh}

/* CARDS */
.page-header{margin-bottom:1.75rem}
.page-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:3px}
.page-sub{font-size:13.5px;color:var(--muted)}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:1.4rem;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1.1rem;display:flex;align-items:center;gap:9px}
.card-icon{width:30px;height:30px;border-radius:8px;background:var(--blue-light);display:flex;align-items:center;justify-content:center}
.card-icon i{font-size:15px;color:var(--blue)}
.card-icon.green{background:var(--green-light)}.card-icon.green i{color:var(--green)}
.card-icon.amber{background:var(--amber-light)}.card-icon.amber i{color:var(--amber)}
.card-icon.purple{background:var(--purple-light)}.card-icon.purple i{color:var(--purple)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:1.75rem}
.stat-card{background:var(--white);border-radius:16px;padding:1.1rem 1.25rem;border:1.5px solid var(--border);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card.blue{border-color:#bfdbfe;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.stat-card.green{border-color:#a7f3d0;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.stat-card.amber{border-color:#fde68a;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.stat-card.purple{border-color:#ddd6fe;background:linear-gradient(135deg,#f5f3ff,#ede9fe)}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-card.blue .stat-icon{background:rgba(26,110,245,.12)}.stat-card.blue .stat-icon i{color:var(--blue)}
.stat-card.green .stat-icon{background:rgba(5,150,105,.12)}.stat-card.green .stat-icon i{color:var(--green)}
.stat-card.amber .stat-icon{background:rgba(217,119,6,.12)}.stat-card.amber .stat-icon i{color:var(--amber)}
.stat-card.purple .stat-icon{background:rgba(124,58,237,.12)}.stat-card.purple .stat-icon i{color:var(--purple)}
.stat-icon i{font-size:18px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-card.blue .stat-value{color:var(--blue)}.stat-card.green .stat-value{color:var(--green)}
.stat-card.amber .stat-value{color:var(--amber)}.stat-card.purple .stat-value{color:var(--purple)}

/* BANNER */
.banner{background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-radius:18px;padding:1.5rem 1.75rem;color:#fff;margin-bottom:1.75rem;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(26,110,245,.3)}
.banner::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.banner h2{font-size:20px;font-weight:800;margin-bottom:5px;letter-spacing:-.4px}
.banner p{font-size:13px;opacity:.85}
.banner-badge{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:.75rem 1.25rem;text-align:center;flex-shrink:0;z-index:1}
.banner-badge .num{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.banner-badge .lbl{font-size:11px;opacity:.8;font-weight:500;margin-top:2px}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead{background:var(--bg)}
th{text-align:left;padding:11px 14px;color:var(--muted);border-bottom:1.5px solid var(--border);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8faff}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green-text);border:1px solid #a7f3d0}
.badge-amber{background:var(--amber-light);color:var(--amber-text);border:1px solid #fde68a}
.badge-red{background:var(--red-light);color:var(--red-text);border:1px solid #fecaca}
.badge-blue{background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe}
.badge-gray{background:var(--bg2);color:var(--muted);border:1px solid var(--border)}
.badge-purple{background:var(--purple-light);color:var(--purple);border:1px solid #ddd6fe}

/* BUTTONS */
.btn{padding:8px 16px;font-size:13px;border-radius:9px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:600}
.btn:hover{background:var(--white);box-shadow:var(--shadow-sm)}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(26,110,245,.25)}
.btn-blue:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,110,245,.4)}
.btn-green{background:var(--green-light);color:var(--green-text);border-color:#a7f3d0}
.btn-green:hover{background:#bbf7d0}
.btn-red{background:var(--red-light);color:var(--red-text);border-color:#fecaca}
.btn-red:hover{background:#fee2e2}
.btn-sm{padding:6px 12px;font-size:12px}

/* FORM */
.form-field{margin-bottom:1rem}
.form-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select,.form-field textarea{width:100%}
.form-field textarea{height:90px;resize:vertical}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* PROGRESS */
.progress-bar{height:8px;border-radius:4px;background:var(--bg2);overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width .8s ease}
.progress-wrap{margin-bottom:2px}
.progress-labels{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px;font-weight:500}

/* MODULE CARDS */
.modulos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:1.5rem}
.modulo-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:1.15rem;transition:all .2s;cursor:pointer}
.modulo-card:hover{box-shadow:var(--shadow);border-color:var(--border2);transform:translateY(-2px)}
.modulo-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.modulo-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.modulo-titulo{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.modulo-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.modulo-meta{display:flex;gap:10px;font-size:11.5px;color:var(--muted);font-weight:500}
.modulo-meta span{display:flex;align-items:center;gap:4px}

/* MATERIAL CARDS */
.material-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.material-item:last-child{border-bottom:none}
.mat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mat-icon.pdf{background:#fef2f2}.mat-icon.pdf i{color:#dc2626;font-size:18px}
.mat-icon.video{background:#eff6ff}.mat-icon.video i{color:var(--blue);font-size:18px}
.mat-icon.quiz{background:var(--amber-light)}.mat-icon.quiz i{color:var(--amber);font-size:18px}
.mat-icon.link{background:var(--green-light)}.mat-icon.link i{color:var(--green);font-size:18px}
.mat-nome{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:2px}
.mat-meta{font-size:11.5px;color:var(--muted)}
.mat-acao{margin-left:auto;flex-shrink:0}

/* NOTA CHIP */
.nota-chip{display:inline-flex;align-items:center;justify-content:center;padding:4px 9px;border-radius:7px;font-size:12.5px;font-weight:800;font-family:'JetBrains Mono',monospace;min-width:40px}
.nota-alta{background:#d1fae5;color:#065f46}.nota-media{background:#fef3c7;color:#92400e}
.nota-baixa{background:#fee2e2;color:#991b1b}.nota-vazia{background:var(--bg2);color:var(--muted2)}
.nota-input{width:72px;font-size:13px;text-align:center;padding:7px 8px;font-family:'JetBrains Mono',monospace;border-radius:8px;font-weight:600}

/* FORUM */
.forum-item{padding:14px 0;border-bottom:1px solid var(--border)}
.forum-item:last-child{border-bottom:none}
.forum-header{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue-light),#dbeafe);border:1.5px solid #bfdbfe;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--blue);flex-shrink:0}
.forum-autor{font-size:13px;font-weight:700;color:var(--text)}
.forum-data{font-size:11.5px;color:var(--muted)}
.forum-titulo{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:4px}
.forum-texto{font-size:13px;color:var(--text2);line-height:1.6}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:340px}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--bg);border-radius:10px;border:1.5px solid var(--border);margin-bottom:10px}
.chat-msg{max-width:70%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-msg.mine{align-self:flex-end;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border-radius:12px 12px 3px 12px}
.chat-msg.other{align-self:flex-start;background:var(--white);border:1.5px solid var(--border);color:var(--text2);border-radius:12px 12px 12px 3px}
.chat-msg-author{font-size:10.5px;font-weight:700;margin-bottom:3px;opacity:.7}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1}
.chat-input-row button{flex-shrink:0}

/* CERTIFICADO */
.cert-card{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;border-radius:16px;padding:2rem;text-align:center;position:relative;overflow:hidden;margin-bottom:1rem}
.cert-card::before{content:'';position:absolute;top:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
.cert-icon{font-size:48px;margin-bottom:12px}
.cert-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.cert-sub{font-size:13px;opacity:.75;margin-bottom:18px}

/* AVISO */
.aviso-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.aviso-item:last-child{border-bottom:none}
.aviso-dot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.aviso-dot.info{background:var(--blue-light)}.aviso-dot.info i{color:var(--blue);font-size:16px}
.aviso-dot.warn{background:var(--amber-light)}.aviso-dot.warn i{color:var(--amber);font-size:16px}
.aviso-dot.ok{background:var(--green-light)}.aviso-dot.ok i{color:var(--green);font-size:16px}
.aviso-titulo{font-size:13.5px;font-weight:700;margin-bottom:3px;color:var(--text)}
.aviso-meta{font-size:11.5px;color:var(--muted)}
.aviso-corpo{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.5}

/* TOAST */
#toast{position:fixed;bottom:1.75rem;right:1.75rem;z-index:999;transition:all .3s cubic-bezier(.34,1.56,.64,1);opacity:0;transform:translateY(12px) scale(.95)}
#toast.show{opacity:1;transform:none}
.toast-inner{background:var(--text);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast-inner i{font-size:16px;color:#4ade80}

/* DASH GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:200px}

/* TABS INTERNAS */
.inner-tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:2px solid var(--border);padding-bottom:0}
.inner-tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.inner-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.inner-tab:hover{color:var(--text)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;text-align:center;padding:1.5rem}
.empty i{font-size:36px;color:var(--muted2);margin-bottom:10px}
.empty p{font-size:13px;color:var(--muted);margin-bottom:12px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-school"></i></div>
      <span class="logo-text">EducaLog</span>
    </div>
    <div class="logo-sub">Ambiente Virtual de Aprendizagem</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('register')">Criar conta</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div id="login-msg" class="hidden"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Entrar como:</div>
      <div class="role-pills" id="login-role-pills">
        <div class="role-pill active" onclick="selRole(this,'aluno')"><i class="ti ti-user-graduate"></i>Aluno</div>
        <div class="role-pill" onclick="selRole(this,'professor')"><i class="ti ti-chalkboard"></i>Professor</div>
      </div>
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-primary" onclick="doLogin()"><i class="ti ti-login"></i> Entrar na plataforma</button>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" class="hidden">
      <div id="reg-msg" class="hidden"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Tipo de conta:</div>
      <div class="role-pills" id="reg-role-pills">
        <div class="role-pill active" onclick="selRegRole(this,'aluno')"><i class="ti ti-user-graduate"></i>Aluno</div>
        <div class="role-pill" onclick="selRegRole(this,'professor')"><i class="ti ti-chalkboard"></i>Professor</div>
      </div>
      <div class="field"><label>Nome completo</label><input type="text" id="reg-name" placeholder="Seu nome completo"></div>
      <div class="form-row-2">
        <div class="field" style="margin:0"><label>Email</label><input type="email" id="reg-email" placeholder="seu@email.com"></div>
        <div class="field" style="margin:0"><label>Senha</label><input type="password" id="reg-pass" placeholder="Mínimo 6 dígitos"></div>
      </div>
      <div id="reg-aluno-fields">
        <div class="form-row-2" style="margin-top:0">
          <div class="field" style="margin:0"><label>Matrícula</label><input type="text" id="reg-mat" placeholder="Ex: 2024001"></div>
          <div class="field" style="margin:0"><label>Curso</label>
            <select id="reg-curso">
              <option value="">Selecione o curso</option>
              <option value="ADS">Análise e Des. de Sistemas</option>
              <option value="Direito">Direito</option>
              <option value="Enfermagem">Enfermagem</option>
              <option value="Biomedicina">Biomedicina</option>
              <option value="Administracao">Administração</option>
              <option value="Psicologia">Psicologia</option>
              <option value="Pedagogia">Pedagogia</option>
            </select>
          </div>
        </div>
        <div class="form-row-2">
          <div class="field" style="margin:0"><label>Período</label>
            <select id="reg-periodo">
              <option value="1">1º Período</option><option value="2">2º Período</option>
              <option value="3">3º Período</option><option value="4">4º Período</option>
              <option value="5">5º Período</option><option value="6">6º Período</option>
              <option value="7">7º Período</option><option value="8">8º Período</option>
            </select>
          </div>
          <div class="field" style="margin:0"><label>Turma</label><input type="text" id="reg-turma" placeholder="Ex: A, B, Noite"></div>
        </div>
      </div>
      <div id="reg-prof-fields" class="hidden">
        <div class="field"><label>Disciplina que leciona</label><input type="text" id="reg-disciplina" placeholder="Ex: Programação Web"></div>
      </div>
      <button class="btn-primary" onclick="doRegister()"><i class="ti ti-user-plus"></i> Criar conta</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><i class="ti ti-school"></i></div>
      <span class="sidebar-logo-text">EducaLog</span>
    </div>
    <div id="sidebar-nav"></div>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-name" id="sb-name">—</div>
        <span class="user-role-badge" id="sb-role">—</span>
        <div class="user-curso" id="sb-curso"></div>
      </div>
      <div class="sidebar-logout" onclick="doLogout()"><i class="ti ti-logout"></i> Sair</div>
    </div>
  </div>
  <div class="content" id="content-area"></div>
</div>

<div id="toast"><div class="toast-inner" id="toast-inner"></div></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const DB={
  get(k){try{return JSON.parse(localStorage.getItem('el_'+k))||null}catch{return null}},
  set(k,v){localStorage.setItem('el_'+k,JSON.stringify(v))},
};

// Currículo por curso
const CURRICULOS={
  ADS:['Algoritmos e Programação','Banco de Dados','Redes de Computadores','Engenharia de Software','Programação Web','Estrutura de Dados','Sistemas Operacionais','Inteligência Artificial'],
  Direito:['Direito Civil','Direito Penal','Direito Constitucional','Direito Administrativo','Direito Trabalhista','Processo Civil','Direito Empresarial','Ética Jurídica'],
  Enfermagem:['Anatomia Humana','Fisiologia','Farmacologia','Semiologia e Semiotécnica','Saúde Coletiva','Enfermagem Clínica','Ética em Enfermagem','Primeiros Socorros'],
  Biomedicina:['Bioquímica','Microbiologia','Parasitologia','Hematologia','Imunologia','Genética','Patologia Clínica','Biologia Molecular'],
  Administracao:['Fundamentos da Administração','Contabilidade Geral','Marketing','Gestão de Pessoas','Empreendedorismo','Finanças Corporativas','Logística','Direito Empresarial'],
  Psicologia:['Psicologia Geral','Neurociência','Psicopatologia','Psicologia Social','Teorias da Personalidade','Psicodinâmica','Avaliação Psicológica','Ética em Psicologia'],
  Pedagogia:['Didática','Psicologia da Educação','Filosofia da Educação','Gestão Escolar','Educação Inclusiva','Estágio Supervisionado','Metodologia Científica','Avaliação Educacional'],
};

const ICONS_CURSO={ADS:'💻',Direito:'⚖️',Enfermagem:'🏥',Biomedicina:'🔬',Administracao:'📊',Psicologia:'🧠',Pedagogia:'📚'};
const COLORS_MAT=['#1a6ef5','#059669','#d97706','#7c3aed','#dc2626','#0891b2','#65a30d','#db2777'];

function seed(){
  if(!DB.get('users')){
    DB.set('users',[
      {id:'demo-aluno',role:'aluno',name:'João Silva',email:'aluno@demo.com',pass:'123456',curso:'ADS',periodo:'3',turma:'A',mat:'2024001'},
      {id:'demo-prof',role:'professor',name:'Prof. Carlos Lima',email:'prof@demo.com',pass:'123456',disciplina:'Programação Web'},
    ]);
  }
  if(!DB.get('notas')) DB.set('notas',[]);
  if(!DB.get('avisos')){
    DB.set('avisos',[
      {id:'av1',titulo:'Início do semestre letivo',corpo:'O semestre 2025/1 começa na próxima segunda-feira. Consulte sua grade horária.',tipo:'info',autor:'Coordenação',data:'30/05/2025'},
      {id:'av2',titulo:'Prazo de entrega de trabalhos',corpo:'Os trabalhos do 1º bimestre devem ser entregues até 20/06/2025.',tipo:'warn',autor:'Secretaria Acadêmica',data:'28/05/2025'},
    ]);
  }
  if(!DB.get('forum')) DB.set('forum',[
    {id:'f1',titulo:'Dúvida sobre Banco de Dados',texto:'Alguém pode explicar a diferença entre JOIN e LEFT JOIN?',autor:'Ana Beatriz',autorId:'a2',data:'29/05/2025',curso:'ADS',respostas:[{texto:'JOIN retorna apenas registros que possuem correspondência nas duas tabelas. LEFT JOIN retorna todos os registros da tabela esquerda e os correspondentes da direita.',autor:'Prof. Carlos Lima',data:'29/05/2025'}]},
  ]);
  if(!DB.get('chat')) DB.set('chat',[
    {id:'c1',texto:'Olá a todos! Bem-vindos à plataforma.',autor:'Coordenação',data:'30/05/2025 09:00',mine:false},
  ]);
  if(!DB.get('progresso')) DB.set('progresso',{});
}
seed();

// ── AUTH ──────────────────────────────────────────────────────────
let CU=DB.get('session');
let loginRole='aluno',regRole='aluno';

function selRole(el,r){loginRole=r;document.querySelectorAll('#login-role-pills .role-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active')}
function selRegRole(el,r){
  regRole=r;
  document.querySelectorAll('#reg-role-pills .role-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');
  document.getElementById('reg-aluno-fields').classList.toggle('hidden',r!=='aluno');
  document.getElementById('reg-prof-fields').classList.toggle('hidden',r!=='professor');
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('tab-login').classList.toggle('hidden',t!=='login');
  document.getElementById('tab-register').classList.toggle('hidden',t!=='register');
}
function showMsg(id,txt,type='err'){
  const el=document.getElementById(id);
  el.className='msg msg-'+(type==='ok'?'ok':'err');
  el.textContent=txt;el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'),4000);
}
function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showMsg('login-msg','Preencha email e senha.');return;}
  const user=(DB.get('users')||[]).find(u=>u.email.toLowerCase()===email&&u.pass===pass&&u.role===loginRole);
  if(!user){showMsg('login-msg','Email, senha ou perfil incorretos.');return;}
  DB.set('session',user);CU=user;enterApp();
}
function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim().toLowerCase();
  const pass=document.getElementById('reg-pass').value;
  if(!name||!email||!pass){showMsg('reg-msg','Preencha nome, email e senha.');return;}
  if(pass.length<6){showMsg('reg-msg','Senha mínima de 6 caracteres.');return;}
  const users=DB.get('users')||[];
  if(users.find(u=>u.email.toLowerCase()===email)){showMsg('reg-msg','Este email já está cadastrado.');return;}
  const nu={id:'u'+Date.now(),role:regRole,name,email,pass};
  if(regRole==='aluno'){
    const curso=document.getElementById('reg-curso').value;
    if(!curso){showMsg('reg-msg','Selecione seu curso.');return;}
    nu.curso=curso;
    nu.periodo=document.getElementById('reg-periodo').value;
    nu.turma=document.getElementById('reg-turma').value||'A';
    nu.mat=document.getElementById('reg-mat').value||'MAT'+Date.now().toString().slice(-6);
  } else {
    nu.disciplina=document.getElementById('reg-disciplina').value.trim();
  }
  users.push(nu);DB.set('users',users);
  showMsg('reg-msg','Conta criada! Faça login.','ok');
  setTimeout(()=>switchTab('login'),1500);
}
function doLogout(){DB.set('session',null);CU=null;document.getElementById('main-screen').classList.add('hidden');document.getElementById('auth-screen').classList.remove('hidden')}

// ── NAV ──────────────────────────────────────────────────────────
const NAV_ALUNO=[
  {id:'dash',icon:'ti-layout-dashboard',label:'Início'},
  {id:'disciplinas',icon:'ti-books',label:'Minhas Disciplinas'},
  {id:'materiais',icon:'ti-files',label:'Materiais'},
  {id:'notas',icon:'ti-clipboard-list',label:'Notas e Desempenho'},
  {id:'tarefas',icon:'ti-checkbox',label:'Tarefas e Quizzes'},
  {id:'forum',icon:'ti-message-circle',label:'Fórum de Dúvidas'},
  {id:'chat',icon:'ti-brand-hipchat',label:'Chat'},
  {id:'avisos',icon:'ti-bell',label:'Avisos'},
  {id:'certificados',icon:'ti-certificate',label:'Certificados'},
];
const NAV_PROF=[
  {id:'dash-prof',icon:'ti-layout-dashboard',label:'Início'},
  {id:'turmas',icon:'ti-users',label:'Turmas e Alunos'},
  {id:'lancar-notas',icon:'ti-pencil',label:'Lançar Notas'},
  {id:'enviar-material',icon:'ti-upload',label:'Materiais'},
  {id:'forum-prof',icon:'ti-message-circle',label:'Fórum'},
  {id:'chat',icon:'ti-brand-hipchat',label:'Chat'},
  {id:'send-aviso',icon:'ti-send',label:'Enviar Aviso'},
];

function buildNav(){
  const nav=CU.role==='aluno'?NAV_ALUNO:NAV_PROF;
  document.getElementById('sidebar-nav').innerHTML=
    '<div class="nav-label">Menu</div>'+
    nav.map(n=>`<div class="nav-item" id="nav-${n.id}" onclick="go('${n.id}')"><i class="ti ${n.icon}"></i>${n.label}</div>`).join('');
}
function go(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+id);if(el)el.classList.add('active');
  document.getElementById('content-area').innerHTML=PAGES[id]?PAGES[id]():'<p style="padding:2rem;color:var(--muted)">Em desenvolvimento.</p>';
  setTimeout(()=>initPage(id),50);
}
function enterApp(){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  document.getElementById('sb-name').textContent=CU.name;
  document.getElementById('sb-role').textContent=CU.role==='aluno'?'Aluno':'Professor';
  if(CU.role==='aluno'){
    const cn=CU.curso?`${ICONS_CURSO[CU.curso]||'📚'} ${CU.curso} — ${CU.periodo}º per.`:'';
    document.getElementById('sb-curso').textContent=cn;
  } else {
    document.getElementById('sb-curso').textContent=CU.disciplina||'';
  }
  buildNav();
  go(CU.role==='aluno'?'dash':'dash-prof');
}

// ── HELPERS ──────────────────────────────────────────────────────
function toast(msg,icon='ti-check'){
  const t=document.getElementById('toast');
  document.getElementById('toast-inner').innerHTML=`<i class="ti ${icon}"></i> ${msg}`;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
function calcMedia(arr){const v=arr.filter(x=>x!==null&&x!==undefined&&x!=='');return v.length?Math.round(v.reduce((a,b)=>a+ +b,0)/v.length*10)/10:null}
function situacao(m){if(m===null)return{l:'Sem nota',c:'badge-gray'};if(m>=7)return{l:'Aprovado',c:'badge-green'};if(m>=5)return{l:'Recuperação',c:'badge-amber'};return{l:'Reprovado',c:'badge-red'}}
function notaChip(v){if(v===null||v===undefined||v==='')return '<span class="nota-chip nota-vazia">—</span>';const n=parseFloat(v);return`<span class="nota-chip ${n>=7?'nota-alta':n>=5?'nota-media':'nota-baixa'}">${n}</span>`}
function getMats(alunoId){return(DB.get('notas')||[]).filter(n=>n.alunoId===alunoId)}
function getAlunos(){return(DB.get('users')||[]).filter(u=>u.role==='aluno')}
function getProgresso(alunoId,disciplina){return((DB.get('progresso')||{})[alunoId+'_'+disciplina])||0}
function setProgresso(alunoId,disciplina,val){const p=DB.get('progresso')||{};p[alunoId+'_'+disciplina]=val;DB.set('progresso',p)}
function getMateriais(){return DB.get('materiais')||[]}
function getTarefas(){return DB.get('tarefas')||[]}
function getCursoMaterias(){return CURRICULOS[CU.curso]||[]}
function mediaGeral(alunoId){
  const ns=getMats(alunoId);
  const ms=ns.map(n=>calcMedia([n.n1,n.n2,n.n3,n.n4])).filter(m=>m!==null);
  return ms.length?Math.round(ms.reduce((a,b)=>a+b,0)/ms.length*10)/10:null;
}

// ── MATERIAIS PADRÃO POR CURSO ──────────────────────────────────
const MATS_PADRAO={
  ADS:[
    {tipo:'video',nome:'Introdução a Algoritmos',disciplina:'Algoritmos e Programação',duracao:'45 min'},
    {tipo:'pdf',nome:'Apostila de Banco de Dados — Cap. 1 e 2',disciplina:'Banco de Dados',paginas:'32 pág.'},
    {tipo:'video',nome:'Fundamentos de Redes',disciplina:'Redes de Computadores',duracao:'38 min'},
    {tipo:'pdf',nome:'UML e Diagramas de Classe',disciplina:'Engenharia de Software',paginas:'28 pág.'},
    {tipo:'quiz',nome:'Quiz: HTML e CSS Básico',disciplina:'Programação Web',questoes:'10 questões'},
    {tipo:'link',nome:'Documentação oficial do Python',disciplina:'Algoritmos e Programação',url:'docs.python.org'},
  ],
  Direito:[
    {tipo:'pdf',nome:'Código Civil Comentado — Parte Geral',disciplina:'Direito Civil',paginas:'80 pág.'},
    {tipo:'video',nome:'Crimes contra o patrimônio',disciplina:'Direito Penal',duracao:'55 min'},
    {tipo:'pdf',nome:'CF/88 Anotada',disciplina:'Direito Constitucional',paginas:'120 pág.'},
    {tipo:'quiz',nome:'Quiz: Princípios constitucionais',disciplina:'Direito Constitucional',questoes:'15 questões'},
  ],
  Enfermagem:[
    {tipo:'pdf',nome:'Atlas de Anatomia Humana — Cabeça e Pescoço',disciplina:'Anatomia Humana',paginas:'60 pág.'},
    {tipo:'video',nome:'Fisiologia Cardiovascular',disciplina:'Fisiologia',duracao:'50 min'},
    {tipo:'quiz',nome:'Quiz: Medicamentos via EV',disciplina:'Farmacologia',questoes:'12 questões'},
    {tipo:'pdf',nome:'Protocolos de Higienização Hospitalar',disciplina:'Semiologia e Semiotécnica',paginas:'24 pág.'},
  ],
  Biomedicina:[
    {tipo:'pdf',nome:'Bioquímica das Proteínas',disciplina:'Bioquímica',paginas:'44 pág.'},
    {tipo:'video',nome:'Técnicas de Coloração Bacteriana',disciplina:'Microbiologia',duracao:'32 min'},
    {tipo:'quiz',nome:'Quiz: Ciclos de vida de parasitas',disciplina:'Parasitologia',questoes:'10 questões'},
  ],
};

// ── PÁGINAS ──────────────────────────────────────────────────────
const PAGES={

// ALUNO: INÍCIO
'dash'(){
  const materias=getCursoMaterias();
  const notas=getMats(CU.id);
  const mgeral=mediaGeral(CU.id);
  const aprovadas=notas.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=7}).length;
  const recup=notas.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=5&&m<7}).length;
  const avisos=(DB.get('avisos')||[]).slice(0,3);
  const tarefas=(getTarefas().filter(t=>t.curso===CU.curso&&!t.entregues?.includes(CU.id))||[]).length;
  const icon=ICONS_CURSO[CU.curso]||'📚';
  const progTotal=materias.length?Math.round(materias.reduce((s,m)=>s+getProgresso(CU.id,m),0)/materias.length)+'%':'0%';

  return`
  <div class="banner">
    <div>
      <h2>Olá, ${CU.name.split(' ')[0]}! ${icon}</h2>
      <p>${CU.curso} — ${CU.periodo}º Período · Turma ${CU.turma||'A'} · Matrícula ${CU.mat||'—'}</p>
    </div>
    <div class="banner-badge">
      <div class="num">${mgeral??'—'}</div>
      <div class="lbl">Média Geral</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-icon"><i class="ti ti-books"></i></div><div class="stat-label">Disciplinas</div><div class="stat-value">${materias.length}</div></div>
    <div class="stat-card green"><div class="stat-icon"><i class="ti ti-circle-check"></i></div><div class="stat-label">Aprovadas</div><div class="stat-value">${aprovadas}</div></div>
    <div class="stat-card amber"><div class="stat-icon"><i class="ti ti-alert-triangle"></i></div><div class="stat-label">Recuperação</div><div class="stat-value">${recup}</div></div>
    <div class="stat-card purple"><div class="stat-icon"><i class="ti ti-checkbox"></i></div><div class="stat-label">Tarefas pend.</div><div class="stat-value">${tarefas}</div></div>
  </div>

  <div class="dash-grid">
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><div class="card-icon"><i class="ti ti-chart-bar"></i></div>Desempenho por disciplina</div>
      ${notas.length?`<div class="chart-wrap"><canvas id="chartDash"></canvas></div>`:`<div class="empty"><i class="ti ti-chart-bar-off"></i><p>Sem notas lançadas ainda</p></div>`}
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><div class="card-icon green"><i class="ti ti-trending-up"></i></div>Progresso geral do curso</div>
      <div style="text-align:center;margin-bottom:12px">
        <div style="font-size:36px;font-weight:800;color:var(--blue)">${progTotal}</div>
        <div style="font-size:12px;color:var(--muted);font-weight:500">concluído</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${materias.slice(0,5).map(m=>{
          const p=getProgresso(CU.id,m);
          return`<div>
            <div class="progress-labels"><span>${m.length>22?m.substring(0,22)+'…':m}</span><span>${p}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${p>=80?'var(--green)':p>=50?'var(--blue)':'var(--amber)'}"></div></div>
          </div>`;
        }).join('')}
        ${materias.length>5?`<a onclick="go('disciplinas')" style="font-size:12px;color:var(--blue);font-weight:600">Ver todas →</a>`:''}
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:1rem">

// ALUNO: DISCIPLINAS
'disciplinas'(){

    const nr=notas.find(n=>n.disciplina===m)||{n1:null,n2:null,n3:null,n4:null};

    const s=situacao(media);
    const prog=getProgresso(CU.id,m);
    const color=COLORS_MAT[i%COLORS_MAT.length];
    const pct=media!==null?Math.min(100,media*10):prog;
    return`<div class="modulo-card">
      <div class="modulo-top">
        <div class="modulo-icon" style="background:${color}22">${icon}</div>
        <span class="badge ${s.c}">${s.l}</span>
      </div>
      <div class="modulo-titulo">${m}</div>
      <div class="modulo-desc">${CU.curso} · ${CU.periodo}º Período</div>
      <div class="progress-labels"><span>Progresso</span><span>${prog}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${color}"></div></div>
      <div class="modulo-meta" style="margin-top:8px">
        <span><i class="ti ti-star"></i> Média: <strong style="color:${media!==null?(media>=7?'var(--green)':media>=5?'var(--amber)':'var(--red)'):'var(--muted)'}">${media??'—'}</strong></span>
        <span><i class="ti ti-files"></i> ${(getMateriais().filter(x=>x.disciplina===m&&x.curso===CU.curso).length||0)+((MATS_PADRAO[CU.curso]||[]).filter(x=>x.disciplina===m).length)} materiais</span>

  }).join('');
  return`
  <div class="page-header"><div class="page-title">Minhas Disciplinas</div><div class="page-sub">${CU.curso} — ${CU.periodo}º Período · ${materias.length} disciplinas</div></div>
  <div class="modulos-grid">${cards}</div>`;
},

// ALUNO: MATERIAIS
'materiais'(){
  const materias=getCursoMaterias();
  const mats=getMateriais().filter(x=>x.curso===CU.curso);
  const padrao=(MATS_PADRAO[CU.curso]||[]);
  const todos=[...padrao.map(m=>({...m,curso:CU.curso,id:'p_'+m.nome})),...mats];

  const tipoIcon={pdf:'ti-file-type-pdf pdf',video:'ti-brand-youtube video',quiz:'ti-help-circle quiz',link:'ti-link link'};
  const tipoLabel={pdf:'PDF','video':'Videoaula',quiz:'Quiz',link:'Link'};

  const rows=todos.map(m=>`<div class="material-item">
    <div class="mat-icon ${m.tipo||'pdf'}"><i class="ti ${(tipoIcon[m.tipo]||'ti-file pdf').split(' ')[0]}"></i></div>
    <div style="flex:1">
      <div class="mat-nome">${m.nome}</div>
      <div class="mat-meta"><span class="badge badge-gray" style="font-size:10px">${tipoLabel[m.tipo]||'Material'}</span> &nbsp; ${m.disciplina} &nbsp; ${m.duracao||m.paginas||m.questoes||m.url||''}</div>
    </div>
    <div class="mat-acao">
      <button class="btn btn-sm btn-blue" onclick="toast('Material aberto: ${m.nome.substring(0,20)}')"><i class="ti ti-download"></i> Acessar</button>
    </div>
  </div>`).join('');

  return`
  <div class="page-header"><div class="page-title">Materiais do Curso</div><div class="page-sub">${CU.curso} · ${todos.length} materiais disponíveis</div></div>
  <div class="card">
    <div class="card-title"><div class="card-icon"><i class="ti ti-files"></i></div>Todos os materiais</div>
    ${todos.length?rows:`<div class="empty"><i class="ti ti-files-off"></i><p>Nenhum material disponível ainda.</p></div>`}
  </div>`;
},

// ALUNO: NOTAS
'notas'(){
  const materias=getCursoMaterias();
  const notas=getMats(CU.id);
  const mgeral=mediaGeral(CU.id);
  const aprovadas=notas.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=7}).length;

  const rows=materias.map(m=>{
    const nr=notas.find(n=>n.disciplina===m)||{n1:null,n2:null,n3:null,n4:null};
    const media=calcMedia([nr.n1,nr.n2,nr.n3,nr.n4]);
    const s=situacao(media);
    const mColor=media===null?'var(--muted)':media>=7?'var(--green)':media>=5?'var(--amber)':'var(--red)';
    const pct=media!==null?Math.min(100,media*10):0;
    return`<tr>
      <td>
        <div style="font-weight:700;color:var(--text)">${m}</div>
        <div class="progress-bar" style="width:90px;margin-top:5px"><div class="progress-fill" style="width:${pct}%;background:${mColor}"></div></div>
      </td>
      <td style="text-align:center">${notaChip(nr.n1)}</td>
      <td style="text-align:center">${notaChip(nr.n2)}</td>
      <td style="text-align:center">${notaChip(nr.n3)}</td>
      <td style="text-align:center">${notaChip(nr.n4)}</td>
      <td style="text-align:center"><span style="font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${mColor}">${media??'—'}</span></td>
      <td><span class="badge ${s.c}">${s.l}</span></td>
    </tr>`;
  }).join('');

  return`
  <div class="banner" style="background:linear-gradient(135deg,#047857,#065f46)">
    <div><h2>📋 Meu Boletim</h2><p>${CU.curso} — ${materias.length} disciplinas · ${aprovadas} aprovadas</p></div>
    <div class="banner-badge"><div class="num">${mgeral??'—'}</div><div class="lbl">Média Geral</div></div>
  </div>
  <div class="card">
    <div class="card-title"><div class="card-icon"><i class="ti ti-clipboard-list"></i></div>Boletim Acadêmico — ${CU.curso}</div>
    <div class="table-wrap">
      <table><thead><tr><th>Disciplina</th><th style="text-align:center">N1</th><th style="text-align:center">N2</th><th style="text-align:center">N3</th><th style="text-align:center">N4</th><th style="text-align:center">Média</th><th>Situação</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
  </div>
  ${notas.length?`<div class="card"><div class="card-title"><div class="card-icon purple"><i class="ti ti-chart-line"></i></div>Evolução bimestral</div><div class="chart-wrap"><canvas id="chartBoletim"></canvas></div></div>`:''}`;
},

// ALUNO: TAREFAS
'tarefas'(){
  const tarefas=getTarefas().filter(t=>t.curso===CU.curso);
  const minhasTarefas=DB.get('entregues_'+CU.id)||[];
  const pendentes=tarefas.filter(t=>!minhasTarefas.includes(t.id));
  const entregues=tarefas.filter(t=>minhasTarefas.includes(t.id));

  const renderTarefa=(t,entregue)=>`<div class="card" style="margin-bottom:.75rem">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="badge ${t.tipo==='quiz'?'badge-amber':t.tipo==='trabalho'?'badge-blue':'badge-purple'}">${t.tipo==='quiz'?'Quiz':t.tipo==='trabalho'?'Trabalho':'Exercício'}</span>
          <span style="font-size:12px;color:var(--muted)">Prazo: ${t.prazo||'Sem prazo'}</span>
        </div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">${t.titulo}</div>
        <div style="font-size:12.5px;color:var(--muted)">${t.disciplina} · ${t.descricao||''}</div>
      </div>
      ${entregue
        ?'<span class="badge badge-green"><i class="ti ti-check"></i> Entregue</span>'
        :`<button class="btn btn-blue btn-sm" onclick="entregarTarefa('${t.id}')"><i class="ti ti-send"></i> Entregar</button>`}
    </div>
  </div>`;

  return`
  <div class="page-header"><div class="page-title">Tarefas e Quizzes</div><div class="page-sub">${pendentes.length} pendente(s) · ${entregues.length} entregue(s)</div></div>
  <div class="inner-tabs">
    <div class="inner-tab active" onclick="switchInner(this,'tp')">Pendentes (${pendentes.length})</div>
    <div class="inner-tab" onclick="switchInner(this,'te')">Entregues (${entregues.length})</div>
  </div>
  <div id="tp">${pendentes.length?pendentes.map(t=>renderTarefa(t,false)).join(''):`<div class="empty"><i class="ti ti-checks"></i><p>Nenhuma tarefa pendente! 🎉</p></div>`}</div>
  <div id="te" class="hidden">${entregues.length?entregues.map(t=>renderTarefa(t,true)).join(''):`<div class="empty"><i class="ti ti-inbox"></i><p>Nenhuma tarefa entregue ainda.</p></div>`}</div>`;
},

// ALUNO: CERTIFICADOS
'certificados'(){
  const materias=getCursoMaterias();
  const notas=getMats(CU.id);
  const aprovadas=notas.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=7});
  const progTotal=materias.length?Math.round(materias.reduce((s,m)=>s+getProgresso(CU.id,m),0)/materias.length):0;
  const concluido=progTotal>=80;
  return`

    ${concluido
      ?`<button class="btn btn-blue" onclick="toast('Certificado gerado com sucesso!')"><i class="ti ti-download"></i> Baixar Certificado</button>`
      :`<div style="font-size:13px;opacity:.75">Progresso atual: ${progTotal}% — Complete 80% para liberar o certificado</div>`}
  </div>
  <div class="card">
    <div class="card-title"><div class="card-icon green"><i class="ti ti-certificate"></i></div>Disciplinas com aprovação</div>
    ${aprovadas.length?aprovadas.map(n=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:34px;height:34px;border-radius:10px;background:var(--green-light);display:flex;align-items:center;justify-content:center"><i class="ti ti-circle-check" style="color:var(--green)"></i></div>
        <div style="flex:1"><div style="font-weight:700;color:var(--text)">${n.disciplina}</div><div style="font-size:12px;color:var(--muted)">Média: ${calcMedia([n.n1,n.n2,n.n3,n.n4])}</div></div>
        <button class="btn btn-sm btn-green" onclick="toast('Declaração de ${n.disciplina} gerada!')"><i class="ti ti-file-certificate"></i> Declaração</button>
      </div>`).join(''):`<div class="empty"><i class="ti ti-certificate-off"></i><p>Nenhuma disciplina aprovada ainda.</p></div>`}
  </div>`;
},

// PROFESSOR: DASHBOARD
'dash-prof'(){
  const alunos=getAlunos();
  const todasNotas=DB.get('notas')||[];
  const avisos=(DB.get('avisos')||[]).slice(0,2);
  const disc=CU.disciplina||'Geral';
  const notasDisc=todasNotas.filter(n=>n.disciplina===disc);
  const aprovados=notasDisc.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=7}).length;
  const recup=notasDisc.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=5&&m<7}).length;
  const reprov=notasDisc.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m<5}).length;
  const ms=notasDisc.map(n=>calcMedia([n.n1,n.n2,n.n3,n.n4])).filter(m=>m!==null);
  const mturma=ms.length?Math.round(ms.reduce((a,b)=>a+b,0)/ms.length*10)/10:null;

  return`
  <div class="banner">
    <div><h2>Olá, ${CU.name.split(' ').slice(-1)[0]}! 👋</h2><p>Disciplina: ${disc} · ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</p></div>
    <div class="banner-badge"><div class="num">${mturma??'—'}</div><div class="lbl">Média da Turma</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-icon"><i class="ti ti-users"></i></div><div class="stat-label">Alunos</div><div class="stat-value">${alunos.length}</div></div>
    <div class="stat-card green"><div class="stat-icon"><i class="ti ti-circle-check"></i></div><div class="stat-label">Aprovados</div><div class="stat-value">${aprovados}</div></div>
    <div class="stat-card amber"><div class="stat-icon"><i class="ti ti-alert-triangle"></i></div><div class="stat-label">Recuperação</div><div class="stat-value">${recup}</div></div>
    <div class="stat-card purple"><div class="stat-icon"><i class="ti ti-x"></i></div><div class="stat-label">Reprovados</div><div class="stat-value">${reprov}</div></div>
  </div>
  <div class="dash-grid">
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><div class="card-icon"><i class="ti ti-users"></i></div>Alunos cadastrados</div>
      ${alunos.slice(0,6).map(a=>{
        const nr=todasNotas.find(n=>n.alunoId===a.id&&n.disciplina===disc);
        const m=nr?calcMedia([nr.n1,nr.n2,nr.n3,nr.n4]):null;
        const s=situacao(m);
        const init=a.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
        return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div class="avatar">${init}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--text)">${a.name}</div>
            <div style="font-size:11.5px;color:var(--muted)">${a.curso||'—'} · ${a.periodo||'—'}º per.</div>
          </div>
          <span class="badge ${s.c}">${m??'—'}</span>
        </div>`;
      }).join('')||'<div class="empty"><i class="ti ti-users-off"></i><p>Nenhum aluno cadastrado.</p></div>'}
      ${alunos.length>6?`<a onclick="go('turmas')" style="font-size:12px;font-weight:600;display:block;margin-top:8px">Ver todos (${alunos.length}) →</a>`:''}

    <div class="card" style="margin-bottom:0">
      <div class="card-title"><div class="card-icon purple"><i class="ti ti-pie-chart"></i></div>Situação da turma</div>
      ${notasDisc.length?`<div class="chart-wrap"><canvas id="chartTurma"></canvas></div>`:`<div class="empty"><i class="ti ti-chart-off"></i><p>Nenhuma nota lançada ainda.</p><button class="btn btn-blue btn-sm" onclick="go('lancar-notas')"><i class="ti ti-pencil"></i> Lançar notas</button></div>`}
    </div>
  </div>
  <div class="card" style="margin-top:1rem">
    <div class="card-title"><div class="card-icon amber"><i class="ti ti-bell"></i></div>Avisos recentes</div>
    ${avisos.map(a=>`<div class="aviso-item">
      <div class="aviso-dot ${a.tipo}"><i class="ti ${a.tipo==='warn'?'ti-alert-triangle':'ti-info-circle'}"></i></div>
      <div><div class="aviso-titulo">${a.titulo}</div><div class="aviso-meta">${a.autor} · ${a.data}</div></div>
    </div>`).join('')||'<p style="color:var(--muted);font-size:13px">Nenhum aviso.</p>'}
  </div>`;
},

      <tbody>${alunos.map(a=>{
        const nr=todasNotas.find(n=>n.alunoId===a.id&&n.disciplina===disc);
        const m=nr?calcMedia([nr.n1,nr.n2,nr.n3,nr.n4]):null;
        const s=situacao(m);
        const mc=m===null?'var(--muted)':m>=7?'var(--green)':m>=5?'var(--amber)':'var(--red)';
        return`<tr>
          <td style="font-weight:700;color:var(--text)">${a.name}</td>
          <td><span class="badge badge-blue">${ICONS_CURSO[a.curso]||''} ${a.curso||'—'}</span></td>
          <td>${a.periodo||'—'}º</td>
          <td><span class="badge badge-gray">${a.turma||'—'}</span></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">${a.mat||'—'}</td>
          <td><strong style="font-family:'JetBrains Mono',monospace;font-size:16px;color:${mc}">${m??'—'}</strong></td>
          <td><span class="badge ${s.c}">${s.l}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`:`<div class="empty"><i class="ti ti-users-off"></i><p>Nenhum aluno cadastrado.</p></div>`}
  </div>`;
},

// PROFESSOR: LANÇAR NOTAS
'lancar-notas'(){
  const alunos=getAlunos();
  const todasNotas=DB.get('notas')||[];
  const disc=CU.disciplina||'Geral';
  if(!alunos.length)return`<div class="page-header"><div class="page-title">Lançar Notas</div></div><div class="card"><div class="empty"><i class="ti ti-users-off"></i><p>Nenhum aluno cadastrado.</p></div></div>`;
  const rows=alunos.map((a,i)=>{
    const nr=todasNotas.find(n=>n.alunoId===a.id&&n.disciplina===disc)||{n1:'',n2:'',n3:'',n4:''};
    const m=calcMedia([nr.n1,nr.n2,nr.n3,nr.n4]);
    const mc=m===null?'var(--muted)':m>=7?'var(--green)':m>=5?'var(--amber)':'var(--red)';
    return`<tr>
      <td><div style="font-weight:700;color:var(--text)">${a.name}</div><div style="font-size:11.5px;color:var(--muted)">${a.curso||'—'} · ${a.periodo||'—'}º per. · Turma ${a.turma||'—'}</div></td>
      ${[1,2,3,4].map(j=>`<td style="text-align:center"><input class="nota-input" type="number" min="0" max="10" step="0.1" value="${nr['n'+j]??''}" oninput="recalcRow(${i})" id="ni_${i}_${j}"></td>`).join('')}
      <td style="text-align:center"><span id="nm_${i}" style="font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${mc}">${m??'—'}</span></td>
    </tr>`;
  }).join('');
  return`
  <div class="page-header"><div class="page-title">Lançar Notas</div><div class="page-sub">Disciplina: ${disc}</div></div>
  <div class="card">
    <div class="card-title"><div class="card-icon"><i class="ti ti-pencil"></i></div>Notas por aluno</div>
    <div class="table-wrap">
      <table><thead><tr><th>Aluno</th><th style="text-align:center">N1</th><th style="text-align:center">N2</th><th style="text-align:center">N3</th><th style="text-align:center">N4</th><th style="text-align:center">Média</th></tr></thead>
      <tbody id="notas-tbody">${rows}</tbody></table>
    </div>
    <div style="margin-top:1.25rem"><button class="btn btn-blue" onclick="salvarNotas(${alunos.length})"><i class="ti ti-device-floppy"></i> Salvar todas as notas</button></div>
  </div>`;
},

// PROFESSOR: MATERIAIS
'enviar-material'(){
  const mats=getMateriais().filter(m=>m.professorId===CU.id);
  return`
  <div class="page-header"><div class="page-title">Gerenciar Materiais</div><div class="page-sub">Disponibilize arquivos para seus alunos</div></div>
  <div class="card">
    <div class="card-title"><div class="card-icon"><i class="ti ti-upload"></i></div>Adicionar material</div>
    <div class="form-grid-2">
      <div class="form-field"><label>Título do material</label><input type="text" id="mat-nome" placeholder="Ex: Apostila de Algoritmos"></div>
      <div class="form-field"><label>Tipo</label>
        <select id="mat-tipo"><option value="pdf">PDF / E-book</option><option value="video">Videoaula</option><option value="quiz">Quiz</option><option value="link">Link externo</option></select>
      </div>
      <div class="form-field"><label>Disciplina</label><input type="text" id="mat-disc" value="${CU.disciplina||''}" placeholder="Disciplina"></div>
      <div class="form-field"><label>Curso destino</label>
        <select id="mat-curso">
          <option value="ADS">ADS</option><option value="Direito">Direito</option>
          <option value="Enfermagem">Enfermagem</option><option value="Biomedicina">Biomedicina</option>
          <option value="Administracao">Administração</option><option value="Psicologia">Psicologia</option><option value="Pedagogia">Pedagogia</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Descrição / Link</label><input type="text" id="mat-desc" placeholder="Breve descrição ou URL"></div>
    <button class="btn btn-blue" onclick="adicionarMaterial()"><i class="ti ti-plus"></i> Adicionar material</button>
  </div>
  <div class="card">
    <div class="card-title"><div class="card-icon green"><i class="ti ti-files"></i></div>Meus materiais (${mats.length})</div>
    ${mats.length?mats.map(m=>`<div class="material-item">
      <div class="mat-icon ${m.tipo||'pdf'}"><i class="ti ti-file"></i></div>
      <div style="flex:1"><div class="mat-nome">${m.nome}</div><div class="mat-meta">${m.disciplina} · ${m.curso}</div></div>
      <button class="btn btn-sm btn-red" onclick="removerMaterial('${m.id}')"><i class="ti ti-trash"></i></button>
    </div>`).join(''):`<div class="empty"><i class="ti ti-files-off"></i><p>Nenhum material adicionado ainda.</p></div>`}
  </div>`;
},

// PROFESSOR: FÓRUM
'forum-prof'(){
  const posts=DB.get('forum')||[];
  return`
  <div class="page-header"><div class="page-title">Fórum — Responder Dúvidas</div><div class="page-sub">${posts.length} discussão(ões) ativa(s)</div></div>
  <div class="card">
    <div class="card-title"><div class="card-icon purple"><i class="ti ti-message-circle"></i></div>Perguntas dos alunos</div>
    ${posts.map(p=>`
      <div class="forum-item">
        <div class="forum-header">
          <div class="avatar">${p.autor.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div><div class="forum-autor">${p.autor}</div><div class="forum-data">${p.data}</div></div>
          ${p.curso?`<span class="badge badge-blue" style="margin-left:auto">${p.curso}</span>`:''}
        </div>
        <div class="forum-titulo">${p.titulo}</div>
        <div class="forum-texto" style="margin-bottom:10px">${p.texto}</div>
        ${(p.respostas||[]).map(r=>`<div style="background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--green)">
          <div style="font-size:11.5px;font-weight:700;color:var(--green);margin-bottom:4px">${r.autor} · ${r.data}</div>
          <div style="font-size:13px;color:var(--text2)">${r.texto}</div>
        </div>`).join('')}
        <div style="display:flex;gap:7px;margin-top:8px">
          <input type="text" id="resp-${p.id}" placeholder="Responder como professor..." style="flex:1;font-size:13px;padding:8px 12px">
          <button class="btn btn-sm btn-blue" onclick="responderForum('${p.id}')"><i class="ti ti-corner-down-left"></i> Responder</button>
        </div>
      </div>`).join('')||'<div class="empty"><i class="ti ti-messages-off"></i><p>Nenhuma dúvida postada ainda.</p></div>'}
  </div>`;
},

// PROFESSOR: AVISOS
'send-aviso'(){
  const avisos=DB.get('avisos')||[];
  return`
  <div class="page-header"><div class="page-title">Enviar Aviso</div><div class="page-sub">Comunique alunos e responsáveis</div></div>
  <div class="card">
    <div class="card-title"><div class="card-icon amber"><i class="ti ti-send"></i></div>Novo comunicado</div>
    <div class="form-grid-2">
      <div class="form-field"><label>Título</label><input type="text" id="av-titulo" placeholder="Ex: Prova bimestral"></div>
      <div class="form-field"><label>Tipo</label>
        <select id="av-tipo"><option value="info">Informativo</option><option value="warn">Urgente</option><option value="ok">Positivo</option></select>
      </div>
    </div>
    <div class="form-field"><label>Mensagem</label><textarea id="av-corpo" placeholder="Texto do comunicado..."></textarea></div>
    <button class="btn btn-blue" onclick="enviarAviso()"><i class="ti ti-send"></i> Publicar aviso</button>
  </div>
  <div class="card">
    <div class="card-title"><div class="card-icon"><i class="ti ti-history"></i></div>Avisos publicados (${avisos.length})</div>
    ${avisos.map(a=>`<div class="aviso-item">
      <div class="aviso-dot ${a.tipo}"><i class="ti ${a.tipo==='warn'?'ti-alert-triangle':a.tipo==='ok'?'ti-circle-check':'ti-info-circle'}"></i></div>
      <div style="flex:1"><div class="aviso-titulo">${a.titulo}</div><div class="aviso-meta">${a.autor} · ${a.data}</div></div>
      <button class="btn btn-sm btn-red" onclick="delAviso('${a.id}')"><i class="ti ti-trash"></i></button>
    </div>`).join('')||'<div class="empty"><i class="ti ti-send-off"></i><p>Nenhum aviso publicado.</p></div>'}
  </div>`;
},

}; // end PAGES

// ── INIT CHARTS ──────────────────────────────────────────────────
function initPage(id){
  if(id==='dash'||id==='notas'){
    const materias=getCursoMaterias();
    const notas=getMats(CU.id);
    const labels=materias.map(m=>m.length>10?m.substring(0,10)+'…':m);
    const medias=materias.map(m=>{const nr=notas.find(n=>n.disciplina===m)||{n1:null,n2:null,n3:null,n4:null};return calcMedia([nr.n1,nr.n2,nr.n3,nr.n4])});
    const colors=medias.map(m=>m===null?'#cbd5e1':m>=7?'rgba(5,150,105,.8)':m>=5?'rgba(217,119,6,.8)':'rgba(220,38,38,.8)');
    if(id==='dash'){
      const c=document.getElementById('chartDash');
      if(c)new Chart(c,{type:'bar',data:{labels,datasets:[{label:'Média',data:medias,backgroundColor:colors,borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:10,ticks:{stepSize:2},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{grid:{display:false},border:{display:false}}}}});
    }
    if(id==='notas'){
      const cb=document.getElementById('chartBoletim');
      if(cb){
        const ds=notas.slice(0,5).map((n,i)=>{const cs=['#1a6ef5','#059669','#d97706','#dc2626','#7c3aed'];const c=cs[i%5];return{label:n.disciplina.length>12?n.disciplina.substring(0,12)+'…':n.disciplina,data:[n.n1,n.n2,n.n3,n.n4],borderColor:c,backgroundColor:c+'18',tension:.4,fill:false,pointRadius:5,pointBackgroundColor:c,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5}});
        new Chart(cb,{type:'line',data:{labels:['N1','N2','N3','N4'],datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},padding:10}}},scales:{y:{min:0,max:10,ticks:{stepSize:2},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{grid:{display:false},border:{display:false}}}}});
      }
    }
  }
  if(id==='dash-prof'){
    const todasNotas=DB.get('notas')||[];
    const disc=CU.disciplina||'Geral';
    const notasDisc=todasNotas.filter(n=>n.disciplina===disc);
    const ap=notasDisc.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=7}).length;
    const rc=notasDisc.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m>=5&&m<7}).length;
    const rp=notasDisc.filter(n=>{const m=calcMedia([n.n1,n.n2,n.n3,n.n4]);return m!==null&&m<5}).length;
    const sn=notasDisc.filter(n=>calcMedia([n.n1,n.n2,n.n3,n.n4])===null).length;
    const ct=document.getElementById('chartTurma');
    if(ct)new Chart(ct,{type:'doughnut',data:{labels:['Aprovados','Recuperação','Reprovados','Sem nota'],datasets:[{data:[ap,rc,rp,sn],backgroundColor:['rgba(5,150,105,.85)','rgba(217,119,6,.85)','rgba(220,38,38,.85)','#e2e8f0'],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},padding:8}}}}});
  }
  // scroll chat to bottom
  const cm=document.getElementById('chat-msgs');
  if(cm)cm.scrollTop=cm.scrollHeight;
}

// ── ACTIONS ──────────────────────────────────────────────────────
function recalcRow(i){
  const vals=[1,2,3,4].map(j=>{const el=document.getElementById('ni_'+i+'_'+j);return el&&el.value!==''?parseFloat(el.value):null});
  const m=calcMedia(vals);
  const el=document.getElementById('nm_'+i);
  if(el){el.textContent=m??'—';el.style.color=m!==null?(m>=7?'var(--green)':m>=5?'var(--amber)':'var(--red)'):'var(--muted)'}
}
function salvarNotas(total){
  const alunos=getAlunos();
  let notas=DB.get('notas')||[];
  const disc=CU.disciplina||'Geral';
  for(let i=0;i<total;i++){
    const a=alunos[i];if(!a)continue;
    const vals=[1,2,3,4].map(j=>{const el=document.getElementById('ni_'+i+'_'+j);return el&&el.value!==''?parseFloat(el.value):null});
    const idx=notas.findIndex(n=>n.alunoId===a.id&&n.disciplina===disc);
    const nr={alunoId:a.id,disciplina:disc,n1:vals[0],n2:vals[1],n3:vals[2],n4:vals[3]};
    if(idx>=0)notas[idx]=nr;else notas.push(nr);
  }
  DB.set('notas',notas);toast('Notas salvas!');
}
function enviarAviso(){
  const titulo=document.getElementById('av-titulo').value.trim();
  const corpo=document.getElementById('av-corpo').value.trim();
  const tipo=document.getElementById('av-tipo').value;
  if(!titulo||!corpo){toast('Preencha título e mensagem.','ti-alert-circle');return;}
  const avisos=DB.get('avisos')||[];
  avisos.unshift({id:'av'+Date.now(),titulo,corpo,tipo,autor:CU.name,data:new Date().toLocaleDateString('pt-BR')});
  DB.set('avisos',avisos);toast('Aviso publicado!');go('send-aviso');
}
function delAviso(id){
  DB.set('avisos',(DB.get('avisos')||[]).filter(a=>a.id!==id));
  toast('Aviso removido.','ti-trash');go('send-aviso');
}
function enviarChat(){
  const input=document.getElementById('chat-input');
  const txt=input.value.trim();if(!txt)return;
  const msgs=DB.get('chat')||[];
  const now=new Date();
  msgs.push({id:'c'+Date.now(),texto:txt,autor:CU.name,autorId:CU.id,data:now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})});
  DB.set('chat',msgs);input.value='';go('chat');
}
function postarForum(){
  const titulo=document.getElementById('f-titulo').value.trim();
  const texto=document.getElementById('f-texto').value.trim();
  if(!titulo||!texto){toast('Preencha título e descrição.','ti-alert-circle');return;}
  const posts=DB.get('forum')||[];
  posts.unshift({id:'f'+Date.now(),titulo,texto,autor:CU.name,autorId:CU.id,curso:CU.curso||null,data:new Date().toLocaleDateString('pt-BR'),respostas:[]});
  DB.set('forum',posts);toast('Pergunta publicada!');go('forum');
}
function responderForum(id){
  const el=document.getElementById('resp-'+id);
  const txt=el?.value?.trim();if(!txt)return;
  const posts=DB.get('forum')||[];
  const p=posts.find(x=>x.id===id);
  if(p){p.respostas=p.respostas||[];p.respostas.push({texto:txt,autor:CU.name,data:new Date().toLocaleDateString('pt-BR')});}
  DB.set('forum',posts);toast('Resposta enviada!');
  go(CU.role==='aluno'?'forum':'forum-prof');
}
function adicionarMaterial(){
  const nome=document.getElementById('mat-nome').value.trim();
  const tipo=document.getElementById('mat-tipo').value;
  const disc=document.getElementById('mat-disc').value.trim();
  const curso=document.getElementById('mat-curso').value;
  const desc=document.getElementById('mat-desc').value.trim();
  if(!nome){toast('Informe o título do material.','ti-alert-circle');return;}
  const mats=getMateriais();
  mats.push({id:'m'+Date.now(),nome,tipo,disciplina:disc,curso,desc,professorId:CU.id});
  DB.set('materiais',mats);toast('Material adicionado!');go('enviar-material');
}
function removerMaterial(id){
  DB.set('materiais',getMateriais().filter(m=>m.id!==id));
  toast('Material removido.','ti-trash');go('enviar-material');
}
function marcarProgresso(disciplina,val){
  setProgresso(CU.id,disciplina,Math.min(100,val));
  toast(`Progresso em "${disciplina.substring(0,20)}" atualizado!`);
  go('disciplinas');
}
function entregarTarefa(id){
  const arr=DB.get('entregues_'+CU.id)||[];
  arr.push(id);DB.set('entregues_'+CU.id,arr);
  toast('Tarefa entregue!');go('tarefas');
}
function switchInner(el,show){
  document.querySelectorAll('.inner-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['tp','te'].forEach(id=>{const d=document.getElementById(id);if(d)d.classList.toggle('hidden',id!==show)});
}

// ── START ──────────────────────────────────────────────────────
if(CU)enterApp();
</script>
</body>
</html>
